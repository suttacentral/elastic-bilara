<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilara Admin Area</title>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.3/dist/cdn.min.js"></script>
    <script src="./static/js/utils.js"></script>
    <script src="./static/js/auth.js"></script>
    <script src="./static/js/adminUsers.js"></script>
    <script src="./static/js/adminProjects.js"></script>
    <script src="./static/js/adminRoots.js"></script>
    <script src="./static/js/adminShiftSegments.js"></script>
    <script src="./static/js/publications.js"></script>
    <script src="./static/js/admin.js"></script>

    <!-- Shoelace Components -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/menu/menu.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/menu-item/menu-item.js"></script>
    <script src="./static/js/elements/admin/sc-bilara-admin-header.js" type="module"></script>
    <script src="./static/js/elements/admin/sc-bilara-admin-projects.js" type="module"></script>
    <script src="./static/js/elements/admin/sc-bilara-admin-publications.js" type="module"></script>
    <script src="./static/js/elements/admin/sc-bilara-admin-users.js" type="module"></script>
    <script src="./static/js/elements/admin/sc-bilara-admin-roots.js" type="module"></script>
    <script src="./static/js/elements/admin/sc-bilara-admin-shift.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-footer.js" type="module"></script>
    <script type="module" src="./static/js/elements/addons/sc-bilara-theme-manager.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./static/css/components/tooltip.css"/>
    <link rel="stylesheet" href="./static/css/components/modals.css"/>
    <link rel="stylesheet" href="./static/css/style.css"/>
    <link rel="stylesheet" href="./static/css/pages/admin.css"/>
    <link rel="stylesheet" href="./static/css/pages/publications.css"/>
    <link rel="stylesheet" href="./static/css/main.css">
</head>
<body class="admin-page" x-init="await redirectNonPrivilegedUserFromAdminToNav()">
    <header class="admin-header" x-data="getUserInfo()" x-init="getRole()">
        <sc-bilara-nav></sc-bilara-nav>
    </header>

    <main class="admin-main" x-data="admin()">
        <nav class="admin-sidebar">
            <div class="admin-nav">
                <h2 class="admin-nav-title">Admin Panel</h2>
                <sl-menu>
                    <sl-menu-item value="users" @click.prevent="setActiveComponent('users')">
                        <i class="bi-people-fill"></i>
                        Users
                    </sl-menu-item>
                    <sl-menu-item value="projects" @click.prevent="setActiveComponent('projects')">
                        <i class="bi-kanban-fill"></i>
                        Projects
                    </sl-menu-item>
                    <sl-menu-item value="publications" @click.prevent="setActiveComponent('publications')">
                        <i class="bi-journal-bookmark-fill"></i>
                        Publications
                    </sl-menu-item>
                    <sl-menu-item value="roots" @click.prevent="setActiveComponent('roots')">
                        <i class="bi-journal-text"></i>
                        Roots
                    </sl-menu-item>
                    <sl-menu-item value="shift" @click.prevent="setActiveComponent('shift')">
                        <i class="bi-arrows-expand"></i>
                        Shift Segments
                    </sl-menu-item>
                </sl-menu>
            </div>
        </nav>

        <article class="admin-content">
            <div x-cloak x-show="dataTypes.users.isVisible">
                <sc-bilara-admin-users></sc-bilara-admin-users>
            </div>
            <div x-cloak x-show="dataTypes.projects.isVisible">
                <sc-bilara-admin-projects></sc-bilara-admin-projects>
            </div>
            <div x-cloak x-show="dataTypes.publications.isVisible">
                <sc-bilara-admin-publications></sc-bilara-admin-publications>
            </div>
            <div x-cloak x-show="dataTypes.roots.isVisible">
                <sc-bilara-admin-roots></sc-bilara-admin-roots>
            </div>
            <div x-cloak x-show="dataTypes.shift.isVisible">
                <sc-bilara-admin-shift></sc-bilara-admin-shift>
            </div>
        </article>
    </main>

    <sc-bilara-nav-footer></sc-bilara-nav-footer>
</body>
</html>
