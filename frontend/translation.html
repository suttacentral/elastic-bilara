<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bilara</title>

    <link rel="stylesheet" href="./static/css/main.css">
    <link rel="stylesheet" href="./static/css/style.css"/>
    <link rel="stylesheet" href="./static/css/pages/translation.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.3/dist/cdn.min.js"></script>

    <script src="./static/js/auth.js"></script>
    <script src="./static/js/utils.js"></script>
    <script src="./static/js/translation.js"></script>
    <script src="./static/js/search.js"></script>
    <script src="./static/js/pullRequest.js"></script>

    <!-- Shoelace Components -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/button/button.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/dialog/dialog.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/checkbox/checkbox.js"></script>

    <!-- Custom Web Components -->
    <script src="./static/js/elements/translation/sc-bilara-translation-edit-status.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-main.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-main-mobile.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-main-footer.js" type="module"></script>
    <script src="./static/js/elements/translation/sc-bilara-translation-project-header.js" type="module"></script>
    <script src="./static/js/elements/translation/sc-bilara-translation-project-actions.js" type="module"></script>
    <script type="module" src="./static/js/elements/addons/sc-bilara-theme-manager.js"></script>
    <script type="module" src="./static/js/elements/addons/sc-bilara-toast.js"></script>
</head>

<body class="page-layout" x-data="getUserInfo()" x-init="getRole()">
    <sl-dialog label="Hint" class="dialog-split-hint">
        When any split is made, you must check the HTML and confirm it is correct.
        <br>
        <div class="dialog-footer">
            <sl-checkbox @sl-change="localStorage.setItem('enableSplitHintDialog', !$event.target.checked);">Don't show again</sl-checkbox>
            <sl-button slot="footer" variant="primary"
                @click="document.querySelector('.dialog-split-hint').hide()"
                class="cc cc-logo">Close
            </sl-button>
        </div>
    </sl-dialog>

    <sl-dialog label="Hint" class="dialog-merge-hint">
        When any merge is made, you must check the HTML and confirm it is correct.
        <br>
        <div class="dialog-footer">
            <sl-checkbox @sl-change="localStorage.setItem('enableMergeHintDialog', !$event.target.checked);">Don't show again</sl-checkbox>
            <sl-button slot="footer" variant="primary"
                @click="document.querySelector('.dialog-merge-hint').hide()"
                class="cc cc-logo">Close
            </sl-button>
        </div>
    </sl-dialog>

    <header>
        <sc-bilara-nav-main></sc-bilara-nav-main>
        <sc-bilara-nav-main-mobile></sc-bilara-nav-main-mobile>
    </header>

    <main class="main-content"
        x-data="{...fetchTranslation(), active: null, params: new URLSearchParams(window.location.search)}"
        x-cloak
        x-show="isActive"
        @toggle-detail-panel.window="active === $event.detail.panel ? active = null : active = $event.detail.panel">

        <sc-bilara-translation-project-header></sc-bilara-translation-project-header>

        <div class="project-container"
            x-data="{
                searchPanelWidth: 280,
                isPanelDragging: false,
                panelStartX: 0,
                panelStartWidth: 280,
                minPanelWidth: 200,
                maxPanelWidth: 500,
                startPanelResize(event) {
                    this.isPanelDragging = true;
                    this.panelStartX = event.clientX;
                    this.panelStartWidth = this.searchPanelWidth;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                },
                onPanelResize(event) {
                    if (!this.isPanelDragging) return;
                    const deltaX = this.panelStartX - event.clientX;
                    let newWidth = this.panelStartWidth + deltaX;
                    newWidth = Math.max(this.minPanelWidth, Math.min(this.maxPanelWidth, newWidth));
                    this.searchPanelWidth = newWidth;
                },
                stopPanelResize() {
                    this.isPanelDragging = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            }"
            :class="{ 'project-container--resizing': isPanelDragging }"
            @mousemove.window="onPanelResize($event)"
            @mouseup.window="stopPanelResize()">
            <div class="translation-grid"
                x-data="{
                    columnWidths: [],
                    isDragging: false,
                    dragIndex: -1,
                    startX: 0,
                    startWidths: [],
                    splitting: false,
                    merging: false,
                    mergingUid: '',
                    splittingUid: '',
                    initWidths() {
                        // Initialization: Divide each column equally
                        if (this.columnWidths.length !== translations.length) {
                            const w = 100 / translations.length;
                            this.columnWidths = translations.map(() => w);
                        }
                    },
                    getColumnStyle(index) {
                        this.initWidths();
                        return `flex: 0 0 ${this.columnWidths[index]}%; width: ${this.columnWidths[index]}%;`;
                    },
                    startResize(index, event) {
                        this.isDragging = true;
                        this.dragIndex = index;
                        this.startX = event.clientX;
                        this.startWidths = [...this.columnWidths];
                        document.body.style.cursor = 'col-resize';
                        document.body.style.userSelect = 'none';
                    },
                    onResize(event) {
                        if (!this.isDragging) return;
                        const container = this.$el;
                        const containerWidth = container.offsetWidth - 120; // Subtract UID column width
                        const deltaX = event.clientX - this.startX;
                        const deltaPercent = (deltaX / containerWidth) * 100;

                        const i = this.dragIndex;
                        let newLeft = this.startWidths[i] + deltaPercent;
                        let newRight = this.startWidths[i + 1] - deltaPercent;

                        // Minimum width limited to 2%
                        const minWidth = 2;
                        if (newLeft < minWidth) {
                            newRight = newRight - (minWidth - newLeft);
                            newLeft = minWidth;
                        }
                        if (newRight < minWidth) {
                            newLeft = newLeft - (minWidth - newRight);
                            newRight = minWidth;
                        }

                        this.columnWidths[i] = Math.max(minWidth, newLeft);
                        this.columnWidths[i + 1] = Math.max(minWidth, newRight);
                    },
                    stopResize() {
                        this.isDragging = false;
                        this.dragIndex = -1;
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                    }
                }"
                :class="{ 'translation-grid--resizing': isDragging }"
                @mousemove.window="onResize($event)"
                @mouseup.window="stopResize()">

                <!-- Grid Header: Column titles for each translation project -->
                <div class="translation-grid__header">
                    <template x-for="(translation, index) in translations" :key="'header-' + index">
                        <div class="translation-grid__header-cell"
                            :style="getColumnStyle(index)">
                            <span class="translation-grid__header-title" x-text="translation.muid"
                                :class="'translation-grid__header-badge--' + (translation.muid || '').split('-')[0]">
                            </span>

                            <!-- Resizer handle (Not shown in the last column) -->
                            <div x-show="index < translations.length - 1"
                                 class="translation-grid__header-resizer"
                                 :class="{ 'translation-grid__header-resizer--dragging': isDragging && dragIndex === index }"
                                 @mousedown.prevent="startResize(index, $event)">
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Grid Body: Row-based layout for synchronized heights -->
                <div class="translation-grid__body" x-ref="gridBody">
                    <template
                        x-for="(uid, rowIndex) in Object.keys((translations.find(t => t.isSource) || {}).data || {})"
                        :key="uid">

                        <!-- Each row contains the same segment across all translation projects -->
                        <div class="translation-row" :data-uid="uid" :data-index="rowIndex">
                            <!-- Cells for each translation project -->
                            <div class="translation-row__cells">
                                <template x-for="(translation, colIndex) in translations" :key="'cell-' + colIndex + '-' + uid">
                                    <div class="translation-cell"
                                        :style="getColumnStyle(colIndex)"
                                        :class="{
                                            'translation-cell--source': translation.isSource,
                                            'translation-cell--editable': translation.canEdit
                                        }"
                                        x-data="{
                                            hints: [],
                                            showHints: false,
                                            hintClicked: false,
                                            isSource: translation.isSource,
                                            isRoot: translation.isSource,
                                            muid: translation.muid,
                                            i: rowIndex,
                                            uid: uid,
                                            originalValue: '',
                                            sourceMuid: new URLSearchParams(window.location.search).get('source'),
                                            get sourceValue() {
                                                const sourceTranslation = translations.find(item => item.muid === this.sourceMuid);
                                                return sourceTranslation ? sourceTranslation.data[uid] : '';
                                            }
                                        }">

                                        <!-- Action buttons (split/merge) -->
                                        <sc-bilara-translation-project-actions
                                            x-show="translation.canEdit"
                                            class="translation-cell__actions">
                                        </sc-bilara-translation-project-actions>

                                        <div class="translation-cell__textarea-wrapper">
                                            <textarea
                                                class="translation-cell__textarea"
                                                :class="{ 'translation-cell__textarea--readonly': !translation.canEdit }"
                                                x-bind:id="isSource ? `root-textarea-${muid}-${uid}` : `translation-textarea-${muid}-${uid}`"
                                                x-bind:value="getValue(translation, uid)"
                                                x-bind:readonly="!translation.canEdit"
                                                x-on:focus="
                                                    originalValue = getValue(translation, uid);
                                                    if (hints.length === 0 && muid.startsWith('translation')) {
                                                        hints = await getHints(uid, muid, sourceMuid, sourceValue);
                                                    }
                                                    showHints = true;
                                                "
                                                x-on:blur="setTimeout(() => { if (!hintClicked) { showHints = false } }, 150)"
                                                x-on:click="hintClicked = false"
                                                x-on:input="setValue(translation, uid, $event.target.value)"
                                                x-on:keydown="ensureStatusBadge($event.target, muid, uid, isSource)"
                                                x-on:keydown.enter.prevent="await handleEnter($event, uid, getValue(translation, uid), translation, originalValue)">
                                            </textarea>
                                        </div>

                                        <!-- Translation hints dropdown -->
                                        <div class="translation-cell__hints"
                                            x-cloak
                                            x-show="hints.length > 0 && showHints && !translation.isSource">
                                            <ul class="translation-cell__hints-list">
                                                <template x-for="hint in hints.slice(0, 5)" :key="hint.uid">
                                                    <li class="translation-cell__hints-item"
                                                        @click="setValue(translation, uid, hint.translation_hints); hintClicked = true; showHints = false;">
                                                        <span class="translation-cell__hints-uid" x-text="hint.uid"></span>
                                                        <div class="translation-cell__hints-content">
                                                            <div class="translation-cell__hints-source" x-text="hint.segment"></div>
                                                            <div class="translation-cell__hints-translation">
                                                                <span class="translation-cell__hints-text" x-text="hint.translation_hints"></span>
                                                                <span class="translation-cell__hints-strength" x-text="'(' + hint.strength + ')'"></span>
                                                            </div>
                                                        </div>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>

                                        <!-- Cell Resizer (Not displayed in the last column) -->
                                        <div x-show="colIndex < translations.length - 1"
                                             class="translation-cell__resizer"
                                             :class="{ 'translation-cell__resizer--dragging': isDragging && dragIndex === colIndex }"
                                             @mousedown.prevent="startResize(colIndex, $event)">
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Panel Resizer -->
            <div class="project-container__resizer"
                :class="{ 'project-container__resizer--dragging': isPanelDragging }"
                @mousedown.prevent="startPanelResize($event)">
            </div>

            <div class="project-container__detail-panel"
                :style="`width: ${searchPanelWidth}px;`"
                x-data="{ active: null }"
                @toggle-detail-panel.window="active === $event.detail.panel ? active = 'none' : active = $event.detail.panel">

                <!-- Related Projects Panel -->
                <div class="project-container__detail-panel__related"
                    x-cloak
                    x-show="active === 'related'"
                    :class="{'active': active === 'related'}"
                    x-data="{selectedProjects: {}}">
                    <h3 class="detail-panel__title">Related Projects</h3>
                    <template x-for="project in relatedProjects" :key="project">
                        <div x-text="project"
                            class="project-container__detail-panel__related-item"
                            @click="selectedProjects[project] = !selectedProjects[project]; await toggleRelatedProject(project);"
                            :class="{ 'project-container__detail-panel__related-item--selected': selectedProjects[project] }">
                        </div>
                    </template>
                </div>

                <div class="project-container__detail-panel__search search active"
                    x-data="{...search(), optionsExpanded: true}">
                    <div class="search__container">
                        <div class="detail-panel__title-row">
                            <h3 class="detail-panel__title">Search</h3>
                            <button class="search__toggle-btn"
                                @click="optionsExpanded = !optionsExpanded"
                                :title="optionsExpanded ? 'Collapse options' : 'Expand options'">
                                <i class="bi" :class="optionsExpanded ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
                            </button>
                        </div>

                        <!-- Collapsible Search Options -->
                        <div class="search__options" x-show="optionsExpanded" x-collapse>
                            <!-- Search Bar -->
                            <div class="search__bar">
                                <i class="bi bi-search search__bar__icon" x-on:click="$event.target.nextElementSibling.focus()"></i>
                                <input type="text"
                                    x-model="projectQuery"
                                    x-on:input="updateSuggestions"
                                    class="search__bar__input"
                                    x-bind:placeholder="new URLSearchParams(window.location.search).get('muid')"
                                    id="project-query"/>
                                <i x-cloak
                                    x-show="projectQuery.length"
                                    x-on:click="projectQuery = ''; updateSuggestions()"
                                    class="bi bi-x-circle search__bar__clear"></i>
                            </div>

                            <!-- Suggestions -->
                            <ul class="search__suggestions">
                                <template x-for="suggestion in suggestions">
                                    <li x-text="suggestion"
                                        x-on:click="toggleSelectedProjects(suggestion)"
                                        :class="{ 'search__suggestion-item--selected': selectedProjects[suggestion] }"
                                        class="search__suggestion-item">
                                    </li>
                                </template>
                            </ul>

                            <!-- Search Fields -->
                            <div class="fields">
                                <template x-for="(value, key) in fields">
                                    <div class="fields__item">
                                        <div class="fields__label__container">
                                            <label x-bind:for="'search-'+key" x-text="key" class="fields__label"></label>
                                            <i x-show="key !== 'uid'"
                                                x-cloak
                                                class="bi bi-x-circle fields__label__cancel"
                                                x-on:click="key !== 'uid' ? toggleSelectedProjects(key) : null"></i>
                                        </div>
                                        <input class="fields__input"
                                            type="text"
                                            x-bind:id="'search-'+key"
                                            :placeholder="key === 'uid' ? 'an1.1:0.1' : ''"
                                            x-model="fields[key]"/>
                                    </div>
                                </template>
                            </div>

                            <!-- Page Size -->
                            <div class="page-size">
                                <label class="page-size__label" for="size">Page Size:</label>
                                <select name="size" id="size" x-model="size" class="page-size__select">
                                    <template x-for="pageSize in [1,5,10,25,50,100]">
                                        <option x-text="pageSize"
                                            x-bind:value="pageSize"
                                            x-bind:selected="pageSize === 100"
                                            class="page-size__select__option">
                                        </option>
                                    </template>
                                </select>
                            </div>

                            <!-- Navigation -->
                            <div class="search__navigation">
                                <button x-on:click="await previousHandler(); scrollTop('#resultsContainer')"
                                    x-cloak
                                    x-show="currentPage > 0"
                                    id="previousPage"
                                    class="search__navigation__previous btn btn--previous">Previous</button>
                                <button id="search"
                                    x-on:click="await searchHandler($event); scrollTop('#resultsContainer'); if(Object.keys(results).length) optionsExpanded = false;"
                                    class="search__navigation__search btn btn--search">Search</button>
                                <button x-on:click="await nextHandler(); scrollTop('#resultsContainer')"
                                    x-bind:disabled="!isNextPage"
                                    x-cloak
                                    x-show="isNextPage"
                                    id="nextPage"
                                    class="search__navigation__next btn btn--next">Next</button>
                            </div>
                        </div>

                        <!-- Collapsed Navigation (shown when collapsed and has results) -->
                        <div class="search__navigation search__navigation--collapsed"
                            x-show="!optionsExpanded && Object.keys(results).length"
                            x-cloak>
                            <button x-on:click="await previousHandler(); scrollTop('#resultsContainer')"
                                x-cloak
                                x-show="currentPage > 0"
                                class="search__navigation__previous btn btn--previous">Previous</button>
                            <button x-on:click="await nextHandler(); scrollTop('#resultsContainer')"
                                x-bind:disabled="!isNextPage"
                                x-cloak
                                x-show="isNextPage"
                                class="search__navigation__next btn btn--next">Next</button>
                        </div>

                        <!-- Results -->
                        <div x-cloak
                            x-show="Object.keys(results).length"
                            x-html="renderResults()"
                            class="search__results-container"
                            id="resultsContainer">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <sc-bilara-toast></sc-bilara-toast>
    <sc-bilara-nav-main-footer></sc-bilara-nav-main-footer>
</body>
</html>
