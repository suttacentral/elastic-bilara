<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilara</title>

    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="./static/css/main.css" />
    <link rel="stylesheet" href="./static/css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.3/dist/cdn.min.js"></script>

    <script src="./static/js/auth.js"></script>
    <script src="./static/js/utils.js"></script>
    <script src="./static/js/nav.js"></script>
    <script src="./static/js/pullRequest.js"></script>
    <script src="./static/js/elements/notification/sc-bilara-notification-icon.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-main.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-main-mobile.js" type="module"></script>
    <script src="./static/js/elements/nav/sc-bilara-nav-main-footer.js" type="module"></script>
    <script src="./static/js/elements/addons/sc-bilara-how-to.js" type="module"></script>
    <script type="module" src="./static/js/elements/addons/sc-bilara-theme-manager.js"></script>
  </head>

  <body class="page-layout" x-data="getUserInfo()" x-init="getRole()">
    <header>
      <sc-bilara-nav-main></sc-bilara-nav-main>
      <sc-bilara-nav-main-mobile></sc-bilara-nav-main-mobile>
    </header>

    <main class="main-content">
      <sc-bilara-how-to></sc-bilara-how-to>
      <p id="pull-request-message"></p>

      <div x-cloak x-show="isActive" x-data="tree()">
        <div class="show-all-button-container">
          <button
            @click="toggleShowAll()"
            :disabled="loading"
            class="btn btn--admin"
          >
            <span x-text="showAllContent ? 'Show my texts' : 'Show all texts'"></span>
          </button>
        </div>
        <div class="navigation-container navigation-container--pushdown">
          <div x-cloak x-show="loading" class="modal">
            <div class="spinner"></div>
          </div>
          <ul class="navigation-list" x-html="render()"></ul>
        </div>
      </div>
    </main>

    <sc-bilara-nav-main-footer></sc-bilara-nav-main-footer>
  </body>
</html>
